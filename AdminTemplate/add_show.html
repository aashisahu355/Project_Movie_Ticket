{% extends 'theatre_dashboard.html' %}
{% load static %}

{% block css %}
<link rel="stylesheet" href="{% static 'css/addmovie.css' %}">

{% endblock css %}



{% block content %}

<div class="container main p-3">
    <form  id="addshowform" method="post">
        {% csrf_token %}
        <label >Choose Movie :</label>
        <select name="movie" id="movie" class="form-select">
            {% for movie in allmovies %}
              <option value="{{movie.id}}">{{movie.Title}}</option>
            {% endfor %}
        </select>

        <label for="">Show Start Date :</label>
        <input type="date" class="form-control" name="show_s_date"><br>

        <label for="">Show End Date :</label>
        <input type="date" class="form-control" name="show_e_date"><br>


        <label for="">Starting Time :</label>
        <input type="time" class="form-control" name="show_s_time"><br>

        <label for="">Ending Time :</label>
        <input type="time" class="form-control" name="show_e_time"><br>


        <input type="submit" value="Add" class="btn btn-dark">

    </form>


</div>
<script>
    const t_id = "{{ t_id }}";
document.getElementById('addshowform').addEventListener('submit',function(e){
        e.preventDefault();

        const formdata = new FormData(e.target)
         fetch(`/theatre/addshow${t_id}/`,
            {
                    method: "POST",
                    body: formdata
                })
         
         .then(res => res.json())
        .then(data => {
            if (data.message) {
                  alert(data.message);
                  window.location.href = '/theatre/';
            }else {
                alert(data.error);
            }

    });
})
</script>

            
{% endblock content %}
