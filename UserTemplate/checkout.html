<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Checkout | Razorpay</title>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</head>
<body>

<h2 style="text-align:center;">Processing Payment...</h2>

<script>
    // Fetch Razorpay order details from Django context
    const razorpayOrderData = {{ order_data|safe }};
</script>

<script>
    const options = {
        "key": "{{ razorpay_key }}",
        "amount": "{{ amount }}",
        "currency": "{{ currency }}",
        "name": "Demo Store",
        "description": "Test Transaction",
        "order_id": "{{ order_id }}",
        "handler": function (response) {
            // Send the payment details to verify_payment view
            const form = document.createElement('form');
            form.method = 'POST';
            form.action = "{% url 'verify_payment' %}";

            const fields = {
                'razorpay_payment_id': response.razorpay_payment_id,
                'razorpay_order_id': response.razorpay_order_id,
                'razorpay_signature': response.razorpay_signature
            };

            for (let key in fields) {
                const input = document.createElement('input');
                input.type = 'hidden';
                input.name = key;
                input.value = fields[key];
                form.appendChild(input);
            }

            document.body.appendChild(form);
            form.submit();
        },
        "theme": {
            "color": "#3399cc"
        }
    };

    const rzp1 = new Razorpay(options);
    rzp1.open();
</script>

</body>
</html>
